name: "Security DAST (OWASP ZAP)"

on:
  schedule:
    - cron: '0 0 * * 6' # Weekly on Saturday at 00:00 UTC
  workflow_dispatch: # Allows manual trigger via GitHub Actions UI

jobs:
  zap_scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Start MongoDB Container
        run: |
          docker-compose up -d
          # Allow MongoDB to complete initialization
          sleep 5

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Start Backend Server
        run: |
          npm run start:server &
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/pharmacy
          PORT: 3000

      - name: Wait for API to be ready
        run: npx wait-on http://127.0.0.1:3000 -t 30000

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: 'http://127.0.0.1:3000'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false # Generates a security issues report in PRs without breaking build directly
