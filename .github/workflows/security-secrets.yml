name: "Secret Scanning (Gitleaks)"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        with:
          args: detect --redact -v --exit-code=2 --report-format=sarif --report-path=results.sarif --log-opts="--all"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

